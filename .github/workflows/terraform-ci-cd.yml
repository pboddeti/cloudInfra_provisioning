name: Terraform CI/CD

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform-ci-cd.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check auth inputs
        run: |
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          test -n "${{ vars.GCP_SERVICE_ACCOUNT }}"

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -var-file=terraform.tfvars -out=tfplan

      - name: Build plan summary
        run: |
          {
            echo "## Terraform Plan Summary"
            echo ""
            echo "### Inputs used"
            echo "- Loaded from GitHub secret: TFVARS_CONTENT"
            echo ""
            echo "### Plan output (first 200 lines)"
            echo '```'
            terraform show -no-color tfplan | sed -n '1,200p'
            echo '```'
          } > plan_summary.md

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: plan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check auth inputs
        run: |
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          test -n "${{ vars.GCP_SERVICE_ACCOUNT }}"

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file=terraform.tfvars -auto-approve -no-color
