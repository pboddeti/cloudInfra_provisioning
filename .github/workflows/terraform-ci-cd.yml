name: Terraform CI/CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform-ci-cd.yml"
  push:
    branches: [ main ]
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform-ci-cd.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Create tfvars from secret
        run: |
          cat > terraform.auto.tfvars <<'EOF'
          ${{ secrets.TFVARS_CONTENT }}
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Build plan summary
        run: |
          {
            echo "## Terraform Plan Summary"
            echo ""
            echo "### Inputs used"
            echo "- Loaded from GitHub secret: TFVARS_CONTENT"
            echo ""
            echo "### Plan output (first 200 lines)"
            echo '```'
            terraform show -no-color tfplan | sed -n '1,200p'
            echo '```'
          } > plan_summary.md

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('plan_summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Create tfvars from secret
        run: |
          cat > terraform.auto.tfvars <<'EOF'
          ${{ secrets.TFVARS_CONTENT }}
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
